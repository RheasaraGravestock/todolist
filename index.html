<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do list</title>
  <link rel="icon" type="image/png" href="cloudicon.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.cdnfonts.com/css/kindegarten" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/so-cloudy" rel="stylesheet">
                
</head>

<body>
  <div class="main-container">
    <div class="todo-container">
      <div class="heading">
        <h1>To-do List</h1>
      </div>
      <div class="todo-wrapper">
        <div class="input-wrapper">
          <input type="text" id="todo-input" placeholder="Add your task">
          <button id="submit">Add</button>
        </div>
        <div id="list-container"></div>
            <!--<li>Task 1</li> v
            <li>Task 2</li>
            <li>Task 3</li>
        </ul>-->
    <div class="task-item template" style="display:none">
            <div>
              <input type="text" class="text" readonly="readonly">
            </div>
            <div class="action-items">
              <i class="check-circle"></i>
              <i class="edit"></i>
              <i class="delete"></i>
            </div>
            </div>
        </div>
      </div>
    </div>
  </div>
</body>

<script src="script.js"></script>

</html>

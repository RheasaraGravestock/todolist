<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do list</title>
  <link rel="icon" type="image/png" href="assets/cloudicon.png">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.cdnfonts.com/css/kindegarten" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/so-cloudy" rel="stylesheet">
                
</head>

<body>
  <div class="main-container">
    <div class="todo-container">
      <div class="heading">
        <h1>To-do List</h1>
      </div>
      <div class="todo-wrapper">
        <div class="input-wrapper">
          <input type="text" id="todo-input" placeholder="Add your task">
          <button id="submit">Add</button>
        </div>
        <div id="list-container"></div>
        </div>
      </div>
    </div>
  </div>
</body>

<script src="script.js"></script>

</html>
